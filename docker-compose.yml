version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: valhalla-eval-postgres
    environment:
      POSTGRES_PASSWORD: password   # 仅用于本地开发，生产环境请使用 docker-compose.prod.yml
      POSTGRES_DB: eval_tools
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
