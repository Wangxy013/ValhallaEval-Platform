version: "3.9"

services:
  # ── Backend (Rust) ───────────────────────────────────────────────────────────
  backend:
    image: artifacts.iflytek.com/hub-docker-repo/aiaas/xywang73/valhallaeval-platform:backend-v0.6.0
    container_name: valhalla-eval-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: "8080"
      RUST_LOG: info
    expose:
      - "8080"

  # ── Frontend (Nginx) ─────────────────────────────────────────────────────────
  frontend:
    image: artifacts.iflytek.com/hub-docker-repo/aiaas/xywang73/valhallaeval-platform:frontend-v0.6.0
    container_name: valhalla-eval-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
