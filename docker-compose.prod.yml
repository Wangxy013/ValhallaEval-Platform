version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: valhalla-eval-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eval_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eval_tools
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eval_user -d eval_tools"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (Rust) ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: valhalla-eval-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://eval_user:${POSTGRES_PASSWORD}@postgres:5432/eval_tools
      PORT: "8080"
      RUST_LOG: info
    expose:
      - "8080"

  # ── Frontend (Nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: valhalla-eval-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  postgres_data:
